name: Terraform Plan

on:
  pull_request:
    paths:
      - "test_modules/dev/**"
      - "modules/**"
      - ".github/workflows/terraform-plan.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test_modules/dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5

      - name: Terraform Init
        run: terraform init -input=false -backend=false

      - name: Terraform Validate
        env:
          # Placeholder GUIDs satisfy required variables during auth-free validation.
          TF_VAR_subscription_id: "00000000-0000-0000-0000-000000000000"
          TF_VAR_tenant_id: "00000000-0000-0000-0000-000000000000"
        run: terraform validate
